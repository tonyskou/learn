<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#534AB7">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Διαβάζω!">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="apple-touch-startup-image" href="icon-512.png">
<title>Διαβάζω!</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --purple: #534AB7;
    --purple-light: #EEEDFE;
    --purple-mid: #7F77DD;
    --purple-dark: #3C3489;
    --coral: #D85A30;
    --teal: #0F6E56;
    --green: #3B6D11;
    --green-light: #EAF3DE;
    --green-border: #97C459;
    --amber: #BA7517;
    --amber-light: #FAEEDA;
    --red: #D84040;
    --text: #1a1a1a;
    --text2: #555;
    --text3: #888;
    --bg: #f7f6f3;
    --bg2: #ffffff;
    --border: #ddd;
    --radius: 12px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bot: env(safe-area-inset-bottom, 0px);
  }

  html { height: 100%; height: -webkit-fill-available; }
  body {
    min-height: 100vh;
    min-height: -webkit-fill-available;
    display: -webkit-flex;
    display: flex;
    -webkit-flex-direction: column;
    flex-direction: column;
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  /* HEADER */
  header {
    background: var(--purple);
    color: white;
    padding: 12px 16px 10px;
    padding-top: calc(12px + var(--safe-top));
    display: -webkit-flex;
    display: flex;
    -webkit-align-items: center;
    align-items: center;
    -webkit-justify-content: space-between;
    justify-content: space-between;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    z-index: 10;
  }
  .header-left { display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center; gap: 10px; }
  .app-title { font-size: 19px; font-weight: 700; letter-spacing: 0.3px; }
  .app-sub { font-size: 11px; opacity: 0.75; margin-top: 1px; }
  .header-stats { text-align: right; font-size: 12px; opacity: 0.88; line-height: 1.5; }
  .logout-btn {
    background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: white;
    border-radius: 8px; padding: 5px 12px; font-size: 12px; cursor: pointer; font-family: inherit;
    white-space: nowrap;
  }
  .logout-btn:active { background: rgba(255,255,255,0.3); }

  /* SYNC DOT */
  .sync-dot {
    display: inline-block; width: 7px; height: 7px; border-radius: 50%;
    margin-left: 4px; vertical-align: middle; position: relative; top: -1px;
    background: #ccc;
  }
  .sync-dot.ok   { background: #5FDF8F; }
  .sync-dot.busy { background: #FFD25A; animation: pulse 1s infinite; }
  .sync-dot.off  { background: #ccc; }
  @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

  /* TABS */
  .tabs {
    display: -webkit-flex; display: flex;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0; z-index: 9;
  }
  .tab {
    -webkit-flex: 1; flex: 1;
    padding: 11px 4px; text-align: center;
    font-size: 12px; font-weight: 500;
    color: var(--text3); cursor: pointer;
    border-bottom: 2.5px solid transparent;
    -webkit-transition: all 0.15s; transition: all 0.15s;
    -webkit-user-select: none; user-select: none;
  }
  .tab.active { color: var(--purple); border-bottom-color: var(--purple); background: #faf9ff; }

  /* MAIN */
  main {
    -webkit-flex: 1; flex: 1;
    overflow-y: auto; -webkit-overflow-scrolling: touch;
    padding: 14px 16px;
    padding-bottom: calc(14px + var(--safe-bot));
    touch-action: pan-y;
  }
  /* Ensure tab content panels also allow scrolling if they get their own scroll context */
  #tab-learn, #tab-review, #tab-stats, #tab-ab {
    touch-action: pan-y;
    -webkit-overflow-scrolling: touch;
  }

  @media (min-width: 680px) {
    main { padding: 20px 10%; }
    .word-card { padding: 3rem 2rem; }
    .syl { font-size: 48px !important; }
    .syl-sep { font-size: 38px !important; }
    .syl-lower { font-size: 26px !important; }
    .syl-sep-lower { font-size: 20px !important; }
    .chips { gap: 10px; }
    .chip { font-size: 15px; padding: 8px 16px; }
    .audio-grid, .word-nav { gap: 12px; }
    .audio-btn, .word-nav button { padding: 16px; font-size: 17px; }
    .celeb-star { font-size: 72px; }
    .celeb-title { font-size: 28px; }
    .stats-grid { grid-template-columns: repeat(4, 1fr); }
  }

  /* AUTH SCREENS */
  #auth-screen {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: var(--bg); z-index: 998;
    display: -webkit-flex; display: flex;
    -webkit-flex-direction: column; flex-direction: column;
    padding: 40px 24px; padding-top: calc(40px + var(--safe-top));
    overflow-y: auto; -webkit-overflow-scrolling: touch;
  }
  .auth-title { font-size: 22px; font-weight: 800; color: var(--purple-dark); margin-bottom: 6px; }
  .auth-sub  { font-size: 14px; color: var(--text3); margin-bottom: 28px; line-height: 1.5; }

  .auth-input {
    width: 100%; padding: 14px 16px; border-radius: 14px;
    border: 1.5px solid var(--border); font-size: 16px;
    background: var(--bg2); font-family: inherit; margin-bottom: 12px;
    -webkit-appearance: none; appearance: none;
  }
  .auth-input:focus { border-color: var(--purple-mid); outline: none; }

  .auth-btn {
    width: 100%; padding: 15px; border-radius: 14px;
    border: none; font-size: 17px; font-weight: 700;
    cursor: pointer; font-family: inherit; margin-bottom: 10px;
    -webkit-appearance: none; appearance: none;
  }
  .auth-btn.primary { background: var(--purple); color: white; }
  .auth-btn.primary:active { opacity: 0.85; }
  .auth-btn.secondary { background: var(--bg2); color: var(--purple-dark); border: 1.5px solid var(--border); }
  .auth-btn.secondary:active { background: var(--purple-light); }

  .auth-toggle { text-align: center; font-size: 13px; color: var(--text3); margin-top: 16px; }
  .auth-toggle a { color: var(--purple); font-weight: 600; cursor: pointer; text-decoration: underline; }

  .auth-error {
    background: #FFF0F0; border: 1px solid #FFD0D0; color: var(--red);
    border-radius: 10px; padding: 10px 14px; font-size: 13px;
    margin-bottom: 16px; display: none;
  }

  /* SET NAV */
  .set-nav { display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center; gap: 8px; margin-bottom: 12px; }
  .nav-btn {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 9px; width: 40px; height: 40px;
    display: -webkit-flex; display: flex;
    -webkit-align-items: center; align-items: center;
    -webkit-justify-content: center; justify-content: center;
    font-size: 16px; cursor: pointer; color: var(--text);
    flex-shrink: 0; -webkit-appearance: none; appearance: none;
  }
  .nav-btn:disabled { opacity: 0.3; }
  .nav-btn:active { background: var(--purple-light); }
  .set-info { -webkit-flex: 1; flex: 1; }
  .set-title { font-size: 16px; font-weight: 700; color: var(--purple-dark); }
  .set-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }

  /* CHIPS */
  .chips { display: -webkit-flex; display: flex; gap: 6px; -webkit-flex-wrap: wrap; flex-wrap: wrap; margin-bottom: 14px; }
  .chip {
    padding: 6px 12px; border-radius: 20px; font-size: 13px;
    cursor: pointer; border: 1px solid var(--border);
    background: var(--bg2); color: var(--text2);
    -webkit-user-select: none; user-select: none;
    -webkit-transition: all 0.12s; transition: all 0.12s;
  }
  .chip.active { background: var(--purple-light); border-color: #AFA9EC; color: var(--purple-dark); font-weight: 700; }
  .chip.done { background: var(--green-light); border-color: var(--green-border); color: var(--green); }
  .chip.done.active { border-color: var(--green); }

  /* PROGRESS */
  .progress-row { display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center; gap: 10px; margin-bottom: 16px; }
  .progress-label { font-size: 12px; color: var(--text3); white-space: nowrap; }
  .progress-track { -webkit-flex: 1; flex: 1; height: 7px; background: #e0e0e0; border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--purple-mid); border-radius: 99px; -webkit-transition: width 0.3s; transition: width 0.3s; }
  .progress-count { font-size: 13px; color: var(--purple); font-weight: 700; }

  /* WORD CARD */
  .word-card {
    background: var(--bg2); border: 2px solid var(--border);
    border-radius: 20px; padding: 2rem 1rem;
    text-align: center; cursor: pointer;
    -webkit-transition: all 0.18s; transition: all 0.18s;
    margin-bottom: 12px;
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none;
  }
  .word-card.learned { background: var(--green-light); border-color: var(--green-border); }
  .word-card:active { -webkit-transform: scale(0.97); transform: scale(0.97); }
  .syllables-display {
    display: -webkit-flex; display: flex;
    -webkit-justify-content: center; justify-content: center;
    -webkit-align-items: baseline; align-items: baseline;
    -webkit-flex-wrap: wrap; flex-wrap: wrap;
    gap: 0; margin-bottom: 14px;
  }
  .syl { font-size: 36px; font-weight: 800; letter-spacing: 1px; }
  .syl-sep { font-size: 30px; color: #ccc; margin: 0 3px; font-weight: 300; }
  .syllables-display-lower {
    display: -webkit-flex; display: flex;
    -webkit-justify-content: center; justify-content: center;
    -webkit-align-items: baseline; align-items: baseline;
    -webkit-flex-wrap: wrap; flex-wrap: wrap;
    gap: 0; margin-bottom: 16px; opacity: 0.7;
  }
  .syl-lower { font-size: 19px; font-weight: 600; letter-spacing: 0.5px; }
  .syl-sep-lower { font-size: 16px; color: #ccc; margin: 0 2px; font-weight: 300; }
  .card-hint { font-size: 14px; color: var(--text3); }
  .word-card.learned .card-hint { color: var(--green); font-weight: 600; }

  /* AUDIO */
  .audio-grid { display: -webkit-flex; display: flex; gap: 8px; margin-bottom: 12px; }
  .audio-btn {
    -webkit-flex: 1; flex: 1; padding: 13px 8px;
    border-radius: var(--radius); border: 1px solid var(--border);
    background: var(--bg2); font-size: 15px; cursor: pointer;
    color: var(--text); -webkit-appearance: none; appearance: none; font-family: inherit;
  }
  .audio-btn:active { background: var(--purple-light); }

  /* LOCK */
  .lock-notice {
    background: var(--amber-light); border-radius: var(--radius);
    padding: 12px 14px; margin-bottom: 12px; text-align: center;
    border: 1px solid #FAC775;
  }
  .lock-title { font-size: 13px; color: var(--amber); font-weight: 700; margin-bottom: 4px; }
  .lock-sub { font-size: 12px; color: #854F0B; }

  /* WORD NAV */
  .word-nav { display: -webkit-flex; display: flex; gap: 8px; margin-bottom: 16px; }
  .word-nav button {
    -webkit-flex: 1; flex: 1; padding: 13px;
    border-radius: var(--radius); border: 1px solid var(--border);
    background: var(--bg2); font-size: 15px; cursor: pointer;
    color: var(--text); -webkit-appearance: none; appearance: none; font-family: inherit;
  }
  .word-nav button:disabled { opacity: 0.3; }
  .word-nav button:active { background: var(--purple-light); }

  /* CELEBRATION */
  .celebration {
    background: var(--purple-light); border: 2px solid #AFA9EC;
    border-radius: 20px; padding: 24px 20px; text-align: center; margin-bottom: 16px;
  }
  .celeb-star { font-size: 60px; margin-bottom: 10px; }
  .celeb-title { font-size: 23px; font-weight: 800; color: var(--purple-dark); margin-bottom: 6px; }
  .celeb-sub { font-size: 15px; color: var(--purple); margin-bottom: 14px; }
  .celeb-note {
    background: white; border-radius: 10px; padding: 10px 14px;
    margin-bottom: 16px; font-size: 13px; color: var(--purple); line-height: 1.6;
  }
  .celeb-btn {
    background: var(--purple); color: white; border: none;
    border-radius: var(--radius); padding: 14px 28px;
    font-size: 17px; font-weight: 700; cursor: pointer;
    font-family: inherit; -webkit-appearance: none; appearance: none;
  }
  .celeb-btn:active { opacity: 0.85; }

  /* REVIEW */
  .review-grid { display: -webkit-flex; display: flex; -webkit-flex-direction: column; flex-direction: column; gap: 8px; }
  .review-set {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px; cursor: pointer;
    -webkit-user-select: none; user-select: none;
  }
  .review-set.completed { border-color: var(--green-border); border-width: 1.5px; }
  .review-set:active { background: #f5f5f5; }
  .review-set-title { font-size: 15px; font-weight: 700; color: var(--text); }
  .review-set-meta { font-size: 12px; color: var(--text3); margin-top: 3px; }
  .review-set.completed .review-set-meta { color: var(--green); }

  /* STATS */
  .stats-grid { display: -webkit-flex; display: flex; -webkit-flex-wrap: wrap; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
  .stat-card {
    background: var(--bg2); border-radius: var(--radius); padding: 16px;
    text-align: center; border: 1px solid var(--border);
    -webkit-flex: 1 1 calc(50% - 5px); flex: 1 1 calc(50% - 5px);
    min-width: 120px;
  }
  .stat-num { font-size: 30px; font-weight: 800; color: var(--purple); }
  .stat-label { font-size: 12px; color: var(--text3); margin-top: 4px; }
  .streak-card {
    background: var(--purple-light); border-radius: var(--radius);
    padding: 18px; text-align: center; margin-bottom: 12px;
    border: 1px solid #AFA9EC;
  }
  .streak-num { font-size: 44px; font-weight: 800; color: var(--purple-dark); }
  .streak-label { font-size: 14px; color: var(--purple); margin-top: 4px; }

  /* OVERLAYS */
  #speech-init {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(83,74,183,0.93); z-index: 999;
    display: -webkit-flex; display: flex;
    -webkit-align-items: center; align-items: center;
    -webkit-justify-content: center; justify-content: center;
    -webkit-flex-direction: column; flex-direction: column;
    padding: 30px; text-align: center;
  }
  #speech-init h2 { color: white; font-size: 22px; font-weight: 700; margin-bottom: 12px; }
  #speech-init p  { color: rgba(255,255,255,0.85); font-size: 15px; margin-bottom: 28px; line-height: 1.6; }
  #speech-init button {
    background: white; color: var(--purple); border: none;
    border-radius: 14px; padding: 16px 36px; font-size: 18px;
    font-weight: 700; cursor: pointer; font-family: inherit;
    -webkit-appearance: none; appearance: none;
  }

  /* AB TAB — Alphabet & Grammar */
  .ab-section { margin-bottom: 20px; }
  .ab-section-title {
    font-size: 17px; font-weight: 700; color: var(--purple-dark);
    margin-bottom: 10px; display: -webkit-flex; display: flex;
    -webkit-align-items: center; align-items: center; gap: 6px;
  }
  .ab-letter-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
    gap: 8px; margin-bottom: 8px;
  }
  .ab-letter-card {
    background: var(--bg2); border: 1.5px solid var(--border);
    border-radius: 12px; padding: 10px 6px;
    text-align: center; cursor: pointer;
    -webkit-transition: all 0.12s; transition: all 0.12s;
    -webkit-user-select: none; user-select: none;
    touch-action: pan-y;
  }
  .ab-letter-card:active { background: var(--purple-light); border-color: #AFA9EC; }
  .ab-letter-upper { font-size: 22px; font-weight: 800; color: var(--purple-dark); line-height: 1.2; }
  .ab-letter-lower { font-size: 18px; font-weight: 700; color: var(--purple-mid); line-height: 1.2; }
  .ab-letter-name { font-size: 11px; color: var(--text3); margin-top: 3px; }

  .ab-digraph-row {
    display: -webkit-flex; display: flex;
    -webkit-align-items: center; align-items: center;
    background: var(--bg2); border: 1.5px solid var(--border);
    border-radius: 12px; padding: 10px 14px; margin-bottom: 8px;
    gap: 10px; cursor: pointer;
    -webkit-transition: all 0.12s; transition: all 0.12s;
    touch-action: pan-y;
  }
  .ab-digraph-row:active { background: var(--purple-light); }
  .ab-digraph-letters { font-size: 20px; font-weight: 800; color: var(--purple-dark); min-width: 44px; text-align: center; }
  .ab-digraph-lower { font-size: 16px; font-weight: 700; color: var(--purple-mid); min-width: 44px; text-align: center; }
  .ab-digraph-sound { font-size: 14px; color: var(--teal); font-weight: 600; }
  .ab-digraph-example { font-size: 12px; color: var(--text3); }
  .ab-speak-btn {
    background: var(--purple-light); border: none; border-radius: 50%;
    width: 34px; height: 34px; font-size: 16px; cursor: pointer;
    display: -webkit-flex; display: flex;
    -webkit-align-items: center; align-items: center;
    -webkit-justify-content: center; justify-content: center;
    flex-shrink: 0; margin-left: auto;
    -webkit-appearance: none; appearance: none;
  }
  .ab-speak-btn:active { background: #D8D4F8; }

  .ab-grammar-card {
    background: var(--bg2); border: 1.5px solid var(--border);
    border-radius: 14px; padding: 14px; margin-bottom: 10px;
  }
  .ab-grammar-title { font-size: 15px; font-weight: 700; color: var(--purple-dark); margin-bottom: 6px; }
  .ab-grammar-text { font-size: 13px; color: var(--text2); line-height: 1.6; }
  .ab-grammar-example {
    display: inline-block; background: var(--purple-light);
    border-radius: 8px; padding: 3px 8px; font-size: 13px;
    margin: 2px 2px; color: var(--purple-dark); font-weight: 600;
  }
  .ab-grammar-highlight {
    color: var(--coral); font-weight: 700;
  }

  @media (min-width: 680px) {
    .ab-letter-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
    .ab-letter-upper { font-size: 28px; }
    .ab-letter-lower { font-size: 22px; }
    .ab-letter-name { font-size: 13px; }
  }

  /* STORIES TAB */
  .story-card {
    background: var(--bg2); border: 1.5px solid var(--border);
    border-radius: 14px; padding: 14px; margin-bottom: 10px;
    cursor: pointer; -webkit-transition: all 0.12s; transition: all 0.12s;
  }
  .story-card:active { background: var(--purple-light); border-color: #AFA9EC; }
  .story-card-id { font-size: 12px; color: var(--text3); }
  .story-card-title { font-size: 16px; font-weight: 700; color: var(--purple-dark); margin-top: 3px; }
  .story-card-preview {
    font-size: 13px; color: var(--text2); margin-top: 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .story-back-btn {
    background: none; border: 1px solid var(--border);
    border-radius: 9px; padding: 8px 16px; font-size: 14px;
    cursor: pointer; color: var(--purple); font-family: inherit;
    margin-bottom: 14px; -webkit-appearance: none; appearance: none;
  }
  .story-back-btn:active { background: var(--purple-light); }

  .story-detail-title {
    font-size: 20px; font-weight: 800; color: var(--purple-dark);
    margin-bottom: 16px; text-align: center;
  }

  .story-text {
    font-size: 18px; line-height: 2.2; text-align: center;
    background: var(--bg2); border-radius: 16px;
    padding: 20px 16px; border: 1.5px solid var(--border);
  }

  .story-word {
    display: inline-block; cursor: pointer;
    padding: 2px 4px; border-radius: 6px;
    -webkit-transition: all 0.1s; transition: all 0.1s;
    touch-action: pan-y;
    margin: 0 1px;
  }
  .story-word:active {
    background: var(--purple-light);
    -webkit-transform: scale(1.08); transform: scale(1.08);
  }
  .story-punct { display: inline; }

  .story-speak-all-btn {
    display: block; margin: 14px auto 0;
    background: var(--purple); color: white; border: none;
    border-radius: 14px; padding: 14px 28px;
    font-size: 16px; font-weight: 700; cursor: pointer;
    font-family: inherit; -webkit-appearance: none; appearance: none;
  }
  .story-speak-all-btn:active { opacity: 0.85; }

  /* Scrollbar visibility on desktop */
  main::-webkit-scrollbar {
    width: 6px;
  }
  main::-webkit-scrollbar-track {
    background: transparent;
  }
  main::-webkit-scrollbar-thumb {
    background: #ccc;
    border-radius: 99px;
  }
  main::-webkit-scrollbar-thumb:hover {
    background: #aaa;
  }
</style>
</head>
<body>

<!-- iOS speech init overlay -->
<div id="speech-init" style="display:none;">
  <h2>📖 Διαβάζω!</h2>
  <p>Για να λειτουργεί ο φωνητικός συλλαβισμός στο iPad/iPhone, πάτησε παρακάτω.</p>
  <button onclick="initSpeech()">Ξεκινάμε! ▶</button>
</div>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div style="text-align:center;margin-bottom:24px;">
    <div style="font-size:48px;margin-bottom:8px;">📖</div>

function toggleAuthMode() {

  } else {
    document.getElementById('auth-title').textContent = 'Καλώς ήρθες!';
    document.getElementById('auth-sub').textContent = 'Συνδέσου για να συγχρονίζεται η πρόοδος του παιδιού σε όλες τις συσκευές.';

    passwordInput.setAttribute('autocomplete', 'current-password');
  }
}

function handleAuth() {
  hideError();
  var email = document.getElementById('auth-email').value.trim();
  var password = document.getElementById('auth-password').value;

  if (!email) { showError('Γράψε το email σου'); return; }

  // First time: we let user try login without password. If it's register mode or if login fails, show password.
  if (!isRegisterMode && !password) {
    // Check if password field is hidden — show it
    document.getElementById('auth-password').style.display = 'block';
    document.getElementById('auth-password').focus();
    return;
  }

  if (!password) { showError('Γράψε τον κωδικό σου'); return; }

  var btn = document.getElementById('auth-btn-primary');
  btn.disabled = true;
  btn.textContent = 'Περίμενε...';

  if (isRegisterMode) {
    firebase.auth().createUserWithEmailAndPassword(email, password)
      .then(function() { onAuthSuccess(); })
      .catch(function(err) {
        btn.disabled = false;
        btn.textContent = 'Δημιουργία';
        if (err.code === 'auth/email-already-in-use') {
          showError('Αυτό το email χρησιμοποιείται ήδη. Πήγαινε στη «Σύνδεση».');
        } else if (err.code === 'auth/weak-password') {
          showError('Ο κωδικός πρέπει να έχει τουλάχιστον 6 χαρακτήρες.');
        } else {
          showError('Σφάλμα: ' + err.message);
        }
      });
  } else {
    firebase.auth().signInWithEmailAndPassword(email, password)
      .then(function() { onAuthSuccess(); })
      .catch(function(err) {
        btn.disabled = false;
        btn.textContent = 'Σύνδεση';
        if (err.code === 'auth/user-not-found' || err.code === 'auth/invalid-credential') {
          showError('Λάθος email ή κωδικός.');
        } else {
          showError('Σφάλμα: ' + err.message);
        }
      });
  }
}

function skipAuth() {
  document.getElementById('auth-screen').style.display = 'none';

function onAuthSuccess() {
  document.getElementById('auth-screen').style.display = 'none';
  showAppShell();
  firebaseReady = true;
  setSyncStatus('ok');
  updateAppSub();
  // Load child list & progress from cloud

}

function logout() {
  firebase.auth().signOut().then(function() {

    document.getElementById('app-body').innerHTML = '';

    document.getElementById('auth-password').style.display = 'none';
    document.getElementById('auth-btn-primary').disabled = false;
    document.getElementById('auth-btn-primary').textContent = 'Σύνδεση';
    if (isRegisterMode) toggleAuthMode();
  });
}

// ── CLOUD SYNC ──
function saveToCloud() {
  if (!firebaseReady || !db || !childKey) return;
  var doc = getActiveChildDoc();
  if (!doc) return;
  setSyncStatus('busy');
  var data = {
    childKey:      childKey,
    learned:       learnedState,
    completedSets: completedSets,
    completedDates:completedDates,
    currentSet:    currentSet,
    currentDay:    currentDay,
    updatedAt:     firebase.firestore.FieldValue.serverTimestamp()
  };
  doc.set(data, { merge: true }).then(function() {
    setSyncStatus('ok');
  }).catch(function(err) {
    console.log('Save error:', err);
    setSyncStatus('off');
  });
}

function loadFromCloud() {
  if (!firebaseReady || !db || !childKey) return;
  var doc = getActiveChildDoc();
  if (!doc) return;
  setSyncStatus('busy');
  doc.get().then(function(snap) {
    if (snap.exists) {
      var d = snap.data();
      var cloudLearned = d.learned || {};
      var localLearned = learnedState;
      var mergedLearned = {};
      var allKeys = new Set();
      Object.keys(cloudLearned).forEach(function(k){ allKeys.add(k); });
      Object.keys(localLearned).forEach(function(k){ allKeys.add(k); });
      allKeys.forEach(function(k) {
        mergedLearned[k] = !!(cloudLearned[k] || localLearned[k]);
      });

      var cloudCompleted = d.completedSets || {};
      var localCompleted = completedSets;
      var mergedCompleted = {};
      var allSetKeys = new Set();
      Object.keys(cloudCompleted).forEach(function(k){ allSetKeys.add(k); });
      Object.keys(localCompleted).forEach(function(k){ allSetKeys.add(k); });
      allSetKeys.forEach(function(k) {
        mergedCompleted[k] = !!(cloudCompleted[k] || localCompleted[k]);
      });

      var cloudDates  = d.completedDates || {};
      var localDates  = completedDates;
      var mergedDates = {};
      var allDateKeys = new Set();
      Object.keys(cloudDates).forEach(function(k){ allDateKeys.add(k); });
      Object.keys(localDates).forEach(function(k){ allDateKeys.add(k); });
      allDateKeys.forEach(function(k) {
        var cd = cloudDates[k], ld = localDates[k];
        if (!cd) mergedDates[k] = ld;
        else if (!ld) mergedDates[k] = cd;
        else mergedDates[k] = cd < ld ? cd : ld;
      });

      var cloudSet = typeof d.currentSet === 'number' ? d.currentSet : 0;
      var cloudDay = typeof d.currentDay === 'number' ? d.currentDay : 0;

      learnedState   = mergedLearned;
      completedSets  = mergedCompleted;
      completedDates = mergedDates;
      currentSet     = Math.max(currentSet, cloudSet);
      currentDay     = Math.max(currentDay, cloudDay);

      saveLocal();
      setSyncStatus('ok');
    } else {
      saveToCloud();
    }
    renderLearn();
    updateHeader();
  }).catch(function(err) {
    console.log('Load error:', err);
    setSyncStatus('off');
  });
}

// ── CHILD LIST MANAGEMENT ──
function loadChildList() {
  var uid = getUserId();
  if (!uid || !db) return;
  db.collection('users').doc(uid).collection('children').orderBy('updatedAt','desc').get().then(function(snap) {
    var children = [];
    snap.forEach(function(doc) {
      children.push(doc.data().childKey);
    });
    if (children.length === 0) {
      // No children yet — show child setup directly
      showChildSetup();
    } else if (!childKey || children.indexOf(childKey) === -1) {
      // Show child picker or setup
      showChildPicker(children);
    } else {
      // Already have a child selected — load progress
      loadFromCloud();
    }
  }).catch(function() {
    // Offline or error — fall back to local child
    if (!childKey) showChildSetup();
    else renderLearn();
  });
}

function lKey(s,d){ return 's'+s+'_d'+d; }
function sKey(s)  { return 'set_'+s; }

function isAudioUnlocked(i){
  var cd = completedDates[sKey(i)];
  if(!cd) return false;
  return (new Date() - new Date(cd)) / 86400000 >= 7;
}
function daysLeft(i){
  var cd = completedDates[sKey(i)];
  if(!cd) return 7;
  return Math.max(0, Math.ceil(7 - (new Date()-new Date(cd))/86400000));
}
function totalLearned()  { return Object.values(learnedState).filter(Boolean).length; }
function totalCompleted(){ return Object.values(completedSets).filter(Boolean).length; }

function initSpeech(){
  document.getElementById('speech-init').style.display = 'none';
  speechReady = true;
  var u = new SpeechSynthesisUtterance(' ');
  u.volume = 0; u.lang = 'el-GR';
  window.speechSynthesis.speak(u);
}
function speak(text){
  if(!window.speechSynthesis) return;
  if(isIOS && !speechReady){ showSpeechInit(); return; }
  var clean = text.replace(/-/g,'');
  var u = new SpeechSynthesisUtterance(clean);
  u.lang = 'el-GR'; u.rate = 0.75;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}
function speakSylsArr(syls){
  if(!window.speechSynthesis) return;
  if(isIOS && !speechReady){ showSpeechInit(); return; }
  window.speechSynthesis.cancel();
  var i = 0;
  function next(){
    if(i >= syls.length) return;
    var u = new SpeechSynthesisUtterance(syls[i]);
    u.lang = 'el-GR'; u.rate = 0.55;
    u.onend  = function(){ i++; setTimeout(next, 380); };
    u.onerror= function(){ i++; setTimeout(next, 380); };
    window.speechSynthesis.speak(u);
  }
  next();
}
function showSpeechInit(){
  document.getElementById('speech-init').style.display = 'flex';
}

    html += '<div class="celebration">' +
      '<div class="celeb-star">🌟</div>' +
      '<div class="celeb-title">ΜΠΡΑΒΟ! Τέλειωσες το Σετ '+(currentSet+1)+'!</div>' +
      '<div class="celeb-sub">Έμαθες '+set.words.length+' νέες λέξεις!</div>' +
      '<div class="celeb-note">🔒 Σε <strong>'+daysLeft(currentSet)+' μέρες</strong> ξεκλειδώνει ο φωνητικός συλλαβισμός.<br>Μέχρι τότε, διάβασε μόνη σου!</div>' +
      '<button class="celeb-btn" onclick="nextSetAuto()">Επόμενο Σετ ▶</button>' +
      '</div>';
  }

  html += '<div class="set-nav">' +
    '<button class="nav-btn" onclick="prevSet()" '+(currentSet===0?'disabled':'')+'>◀</button>' +
    '<div class="set-info">' +
      '<div class="set-title">'+set.title+'</div>' +
      '<div class="set-sub">Σετ '+(currentSet+1)+' από '+WORD_SETS.length+
        (setDone ? (audioOk ? ' · 🔊 Φωνή ενεργή' : ' · 🔒 Φωνή σε '+daysLeft(currentSet)+' μέρες') : '') +
      '</div>' +
    '</div>' +
    '<button class="nav-btn" onclick="nextSet()" '+(currentSet===WORD_SETS.length-1?'disabled':'')+'>▶</button>' +
  '</div>';

  html += '<div class="chips">';
  set.words.forEach(function(_,i){
    var dk = lKey(currentSet,i);
    var isDone = !!learnedState[dk];
    html += '<div class="chip'+(i===currentDay?' active':'')+(isDone?' done':'')+'" onclick="selDay('+i+')">Λ'+(i+1)+'</div>';
  });
  html += '</div>';

  html += '<div class="progress-row">' +
    '<span class="progress-label">Πρόοδος:</span>' +
    '<div class="progress-track"><div class="progress-fill" style="width:'+pct+'%"></div></div>' +
    '<span class="progress-count">'+lCount+'/10</span>' +
  '</div>';

  var sylsHTML = '';
  var sylsLowerHTML = '';
  syls.forEach(function(s,i){
    var col = learned ? '#3B6D11' : colors[i % colors.length];
    var upperSyl = s.toUpperCase().replace(/[ΆΈΉΊΌΎΏ]/g,function(c){ return {Ά:'Α',Έ:'Ε',Ή:'Η',Ί:'Ι',Ό:'Ο',Ύ:'Υ',Ώ:'Ω'}[c]; });
    sylsHTML += '<span class="syl" style="color:'+col+';">'+upperSyl+'</span>';

    var lowerSyl = s;
    if(i === syls.length-1 && lowerSyl.slice(-1) === 'σ'){
      lowerSyl = lowerSyl.slice(0,-1) + 'ς';
    }
    sylsLowerHTML += '<span class="syl-lower" style="color:'+col+';">'+lowerSyl+'</span>';

    if(i < syls.length-1){
      sylsHTML += '<span class="syl-sep">-</span>';
      sylsLowerHTML += '<span class="syl-sep-lower">-</span>';
    }
  });

  html += '<div class="word-card'+(learned?' learned':'')+'" onclick="toggleLearned()">' +
    '<div class="syllables-display">'+sylsHTML+'</div>' +
    '<div class="syllables-display-lower">'+sylsLowerHTML+'</div>' +
    '<div class="card-hint">'+(learned ? '✓ Έμαθα αυτή τη λέξη!' : 'Πάτησε όταν τη μάθεις')+'</div>' +
  '</div>';

  if(audioOk){
    html += '<div class="audio-grid">' +
      '<button class="audio-btn" onclick="speakSylsArr('+sylsJSON+')">🔊 Συλλαβές</button>' +
      '<button class="audio-btn" onclick="speak(\''+wordObj.w.replace(/'/g,"\\'")+"')\">🔊 Λέξη</button>" +
    '</div>';
  } else if(setDone){
    html += '<div class="lock-notice">' +
      '<div class="lock-title">🔒 Φωνή σε '+daysLeft(currentSet)+' μέρες</div>' +
      '<div class="lock-sub">Πρώτα διάβασε μόνη σου, μετά άκουσε!</div>' +
    '</div>';
  }

  html += '<div class="word-nav">' +
    '<button onclick="prevDay()" '+(currentDay===0?'disabled':'')+'>◀ Προηγ.</button>' +
    '<button onclick="nextDay()" '+(currentDay===9?'disabled':'')+'>Επόμ. ▶</button>' +
  '</div>';

  learnEl.innerHTML = html;
  updateHeader();
}

function toggleLearned(){
  var k = lKey(currentSet, currentDay);
  learnedState[k] = !learnedState[k];
  save();
  var set = WORD_SETS[currentSet];
  var allDone = set.words.every(function(_,i){ return learnedState[lKey(currentSet,i)]; });
  if(allDone && !completedSets[sKey(currentSet)]){
    completedSets[sKey(currentSet)]  = true;
    completedDates[sKey(currentSet)] = new Date().toISOString();
    save();
    celebPending = true;
  }
  renderLearn();
}

function selDay(i)  { currentDay=i; celebPending=false; save(); renderLearn(); }
function prevDay()  { if(currentDay>0){ currentDay--; save(); renderLearn(); } }
function nextDay()  { if(currentDay<9){ currentDay++; save(); renderLearn(); } }
function prevSet()  { if(currentSet>0){ currentSet--; currentDay=0; celebPending=false; save(); renderLearn(); } }
function nextSet()  { if(currentSet<WORD_SETS.length-1){ currentSet++; currentDay=0; celebPending=false; save(); renderLearn(); } }
function nextSetAuto(){ celebPending=false; if(currentSet<WORD_SETS.length-1){ currentSet++; currentDay=0; save(); } renderLearn(); }

// ── REVIEW ──
function renderReview(){
  var any = false;
  var html = '';
  WORD_SETS.forEach(function(set,i){ if(completedSets[sKey(i)]) any=true; });
  if(!any){
    html = '<div style="text-align:center;padding:3rem 1rem;color:var(--text3);font-size:15px;">Ολοκλήρωσε το πρώτο σετ για να εμφανιστεί εδώ!</div>';
  } else {
    html = '<p style="font-size:13px;color:var(--text3);margin-bottom:12px;">Σετ που έχεις ολοκληρώσει — πάτησε για επανάληψη:</p><div class="review-grid">';
    WORD_SETS.forEach(function(set,i){
      if(!completedSets[sKey(i)]) return;
      var aok = isAudioUnlocked(i);
      html += '<div class="review-set completed" onclick="goReview('+i+')">' +
        '<div class="review-set-title">'+set.title+'</div>' +
        '<div class="review-set-meta">Σετ '+(i+1)+' · '+(aok?'🔊 Φωνή ενεργή':'🔒 Φωνή σε '+daysLeft(i)+' μέρες')+'</div>' +
      '</div>';
    });
    html += '</div>';
  }
  document.getElementById('tab-review').innerHTML = html;
}
function goReview(i){
  currentSet=i; currentDay=0; celebPending=false; save();
  switchTab('learn', document.getElementById('tab-btn-learn'));
  renderLearn();
}

function speakLetter(text) {
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  setTimeout(function() {
    var u = new SpeechSynthesisUtterance(text);
    u.lang = 'el-GR'; u.rate = 1.0;
    window.speechSynthesis.speak(u);
  }, 120);
}

// ── STORIES ──
var currentStoryId = 0;

function renderStories() {
  var html = '<div class="ab-section-title">📖 Διάλεξε μια ιστορία</div>';
  html += '<p style="font-size:13px;color:var(--text3);margin-bottom:14px;">Πάτησε σε μια ιστορία. Μετά πάτησε κάθε λέξη για να την ακούσεις 🔊</p>';

  STORIES.forEach(function(s) {
    var preview = s.text.length > 60 ? s.text.substring(0,60) + '...' : s.text;
    html += '<div class="story-card" onclick="openStory('+s.id+')">';
    html += '<div class="story-card-id">Ιστορία '+s.id+'</div>';
    html += '<div class="story-card-title">'+s.title+'</div>';
    html += '<div class="story-card-preview">'+preview+'</div>';
    html += '</div>';
  });

  html += '<div style="height:60px;"></div>';
  document.getElementById('tab-stories').innerHTML = html;
}

function openStory(id) {
  currentStoryId = id;
  var story = STORIES.find(function(s) { return s.id === id; });
  if (!story) return;

  // Build clickable word view
  var wordsHTML = '';
  // Split text into words + punctuation tokens
  var tokens = story.text.match(/[Α-Ωα-ωΆΈΉΊΌΎΏάέήίόύώΐΰϊϋ]+|[^Α-Ωα-ωΆΈΉΊΌΎΏάέήίόύώΐΰϊϋ]+/g) || [];
  tokens.forEach(function(token) {
    // Check if it's a word (contains Greek letters)
    if (/[Α-Ωα-ωΆΈΉΊΌΎΏάέήίόύώΐΰϊϋ]/.test(token)) {
      var word = token;
      var cleanWord = word.replace(/[.,!?;:'"«»()\[\]]/g, '');
      wordsHTML += '<span class="story-word" onclick="speakWord(event, \''+cleanWord.replace(/'/g,"\\'")+'\')">'+word+'</span>';
    } else {
      wordsHTML += '<span class="story-punct">'+token+'</span>';
    }
  });

  var html = '<button class="story-back-btn" onclick="renderStories()">← Πίσω στις ιστορίες</button>';
  html += '<div class="story-detail-title">'+story.title+'</div>';
  html += '<div class="story-text">'+wordsHTML+'</div>';
  html += '<button class="story-speak-all-btn" onclick="speakStory('+id+')">🔊 Άκου όλη την ιστορία</button>';
  html += '<div style="height:40px;"></div>';

  document.getElementById('tab-stories').innerHTML = html;
}

function speakWord(event, word) {
  // Stop click from propagating to parent
  if (event) event.stopPropagation();
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  setTimeout(function() {
    var u = new SpeechSynthesisUtterance(word);
    u.lang = 'el-GR'; u.rate = 0.55;
    window.speechSynthesis.speak(u);
  }, 50);
}

function speakStory(id) {
  if (!window.speechSynthesis) return;
  var story = STORIES.find(function(s) { return s.id === id; });
  if (!story) return;
  window.speechSynthesis.cancel();
  // Split into sentences for natural pauses
  var sentences = story.text.split(/(?<=[.!?])\s+/);
  var i = 0;
  function next() {
    if (i >= sentences.length) return;
    var u = new SpeechSynthesisUtterance(sentences[i]);
    u.lang = 'el-GR'; u.rate = 0.7;
    u.onend = function() { i++; setTimeout(next, 400); };
    u.onerror = function() { i++; setTimeout(next, 400); };
    window.speechSynthesis.speak(u);
  }
  next();
}

// ── INIT ──
// Initialize Firebase
try {
  firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
  db.enablePersistence({ synchronizeTabs: true }).catch(function(err) {
    if (err.code === 'failed-precondition') {
      console.log('Multiple tabs — persistence in one only');
    }
  });

  // Listen for auth state changes
  firebase.auth().onAuthStateChanged(function(user) {
    if (user) {
      // User is signed in — already handled by onAuthSuccess()
      // But if this is a page reload with a persisted session, init the app
      var authScreen = document.getElementById('auth-screen');
      if (authScreen.style.display !== 'none' || !document.getElementById('logout-btn') || document.getElementById('logout-btn').style.display === 'none') {
        document.getElementById('auth-screen').style.display = 'none';
        if (document.getElementById('app-body').innerHTML === '') showAppShell();
        firebaseReady = true;
        setSyncStatus('ok');
        updateAppSub();
        document.getElementById('logout-btn').style.display = '';
        loadChildList();
      }
    }
  });
} catch(e) {
  console.log('Firebase not available');
}

  setTimeout(function(){ document.getElementById('speech-init').style.display='flex'; }, 800);
}
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(function(){});
}

var _initSpeech = initSpeech;
initSpeech = function(){
  _initSpeech();
  localStorage.setItem('speechInitDone','1');
};
if(localStorage.getItem('speechInitDone')) speechReady = true;

document.getElementById('auth-email').addEventListener('keydown', function(e) {
